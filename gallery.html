<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介 | Gallery</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico"/>
    <link rel="apple-touch-icon" href="apple-icon.png"/>
</head>
<body>
    <header class="main-header">
        <a href="index.html" class="logo">MY Profile</a>
        <nav class="main-nav">
            <ul>
                <li><a href="index.html">ホーム</a></li>
                <li><a href="profile.html">プロフィール</a></li>
                <li><a href="hobby.html">趣味</a></li>
                <li><a href="gallery.html">ギャラリー</a></li>
            </ul>
        </nav>
    </header>
    <div class="layout">
        <main class="main-content">
            <section class="page-title">
                <p class="sub-title">Gallery</p>
                <h1>ギャラリー</h1>
                <p>野球・その他・動画</p>
            </section>

            <section class="gallery-section">
                <details class="gallery-accordion">
                    <summary>野球</summary>
                    <div class="photo-scroll">
                        <div class="media-item">
                            <img src="images/image8.jpeg" alt="野球の写真1">
                        </div>
                        <div class="media-item">
                            <img src="images/image9.jpeg" alt="野球の写真5">
                        </div>
                        <div class="media-item">
                            <img src="images/image4.jpeg" alt="野球の写真6">
                        </div>
                        <div class="media-item">
                            <img src="images/image2.jpeg" alt="野球の写真7">
                        </div>
                        <div class="media-item">
                            <img src="images/image3.jpeg" alt="野球の写真8">
                        </div>
                    </div>
                </details>

                <details class="gallery-accordion">
                    <summary>その他</summary>
                    <div class="photo-scroll">
                        <div class="media-item">
                            <img src="images/image11.jpeg" alt="その他の写真1">
                        </div>
                        <div class="media-item">
                            <img src="images/image13.jpeg" alt="その他の写真2">
                        </div>
                        <div class="media-item">
                            <img src="images/image12.jpeg" alt="その他の写真3">
                        </div>
                        <div class="media-item">
                            <img src="images/image14.jpeg" alt="その他の写真4">
                        </div>
                        <div class="media-item">
                            <img src="images/image15.jpeg" alt="その他の写真5">
                        </div>
                        <div class="media-item">
                            <img src="images/image16.jpeg" alt="その他の写真6">
                        </div>
                        <div class="media-item">
                            <img src="images/image17.jpeg" alt="その他の写真7">
                        </div>
                    </div>
                </details>

                <details class="gallery-accordion">
                    <summary>動画</summary>
                    <div class="photo-scroll">
                        <div class="media-item">
                            <video controls>
                                <source src="images/baseball1.mp4" type="video/mp4">
                                野球の動画1
                            </video>
                        </div>
                        <div class="media-item">
                            <video controls>
                                <source src="images/baseball2.mp4" type="video/mp4">
                                野球の動画2
                            </video>
                        </div>
                    </div>
                </details>
            </section>
        </main>

        <aside class="sidebar">
            <h2>SNS</h2>
            <div class="sns-links">
                <a href="https://www.instagram.com/181.haaan/" target="_blank">Instagram</a>
            </div>
        </aside>
    </div>

    <footer class="main-footer">
        <nav class="footer-nav">
            <a href="index.html">ホーム</a>
            <a href="profile.html">プロフィール</a>
            <a href="hobby.html">趣味</a>
            <a href="gallery.html">ギャラリー</a>
        </nav>
        <p>&copy; 2026 My Profile Site</p>
    </footer>
</body>
</html>
